<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Steady</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    height:100dvh;overflow:hidden;
    background:radial-gradient(130% 110% at 50% 8%,#1d2a26 0%,#141d1a 45%,#0d1311 100%);
    color:#dfe9e4;
    font:16px/1.5 ui-rounded,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    user-select:none;position:relative;
  }

  /* faint title, top */
  .mark{position:absolute;top:max(20px,env(safe-area-inset-top));left:0;right:0;text-align:center;
    font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:#4d6258;font-weight:500}

  /* ---- The object: a breathing triangle (the volcano at rest) ---- */
  .stage{display:flex;flex-direction:column;align-items:center;gap:clamp(26px,6vh,52px);cursor:pointer}
  .triangle-wrap{position:relative;width:clamp(180px,52vw,300px);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  svg{width:100%;height:100%;overflow:visible;animation:breathe 9s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(.94)}50%{transform:scale(1.04)}}
  .glow{filter:blur(26px);opacity:.5;animation:pulse 9s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.32}50%{opacity:.62}}
  .stage:hover svg{animation-play-state:paused}

  /* one quiet line that drifts */
  .whisper{font-size:clamp(15px,4vw,18px);color:#86a497;font-weight:400;text-align:center;max-width:22ch;
    min-height:2.6em;display:flex;align-items:center;justify-content:center;transition:opacity 1.4s ease;letter-spacing:.01em}
  .enter{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#3f5249;transition:opacity .6s}

  /* ---- "open the hood" — a thin tab at the very bottom ---- */
  .hood{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;
    padding:14px 0 max(16px,env(safe-area-inset-bottom));cursor:pointer;z-index:5}
  .hood .grip{width:34px;height:4px;border-radius:4px;background:#2c3b35;transition:background .3s}
  .hood:hover .grip{background:#4d6258}

  /* ---- The hood panel (tools, hidden by default) ---- */
  .panel{position:fixed;inset:0;z-index:20;background:rgba(8,12,11,.78);backdrop-filter:blur(8px);
    display:none;flex-direction:column;justify-content:flex-end}
  .panel.show{display:flex;animation:fade .3s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .panel-inner{background:#121b18;border-radius:24px 24px 0 0;border-top:1px solid #233029;
    padding:22px 22px max(22px,env(safe-area-inset-bottom));max-height:90dvh;overflow:auto;animation:up .3s ease}
  @keyframes up{from{transform:translateY(40px)}to{transform:translateY(0)}}
  .grip-c{width:38px;height:4px;border-radius:4px;background:#2c3b35;margin:0 auto 18px}
  .panel h2{font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:#5d7468;font-weight:500;text-align:center;margin-bottom:18px}
  .tool{padding:14px 4px;border-bottom:1px solid #1c2722;cursor:pointer;display:flex;align-items:baseline;gap:14px;transition:color .2s}
  .tool:last-child{border-bottom:0}
  .tool:hover{color:#fff}
  .tool .n{color:#4d6258;font-size:13px;font-variant-numeric:tabular-nums;flex:0 0 auto}
  .tool .ti{font-size:16px;color:#cfe0d8;font-weight:450}
  .tool-detail{font-size:14px;color:#86a497;line-height:1.55;max-height:0;overflow:hidden;transition:max-height .3s ease;grid-column:2}
  .tool.open .tool-detail{max-height:300px;padding-top:8px}
  .tool .row{display:flex;align-items:baseline;gap:14px;width:100%}
  .tool .col{flex:1}
  .ln{background:#1a2723;color:#dfe9e4;border-radius:8px;padding:7px 11px;margin:7px 0;font-weight:450}
  .ln.warm{background:#2a221a;color:#e8c9a8}
  .reflect-link{text-align:center;margin-top:20px}
  .reflect-link button{background:none;border:1px solid #233029;color:#86a497;border-radius:11px;padding:11px 18px;font:inherit;font-size:14px;cursor:pointer}
  .reflect-link button:hover{border-color:#4d6258;color:#cfe0d8}

  /* reflection mini-sheet reuses panel */
  textarea{width:100%;border:1px solid #233029;background:#0e1513;color:#dfe9e4;border-radius:12px;padding:12px 14px;font:inherit;resize:none;min-height:84px}
  textarea:focus{outline:1px solid #4d6258}
  .save{margin-top:12px;border:0;background:#5b8a78;color:#fff;border-radius:11px;padding:11px 18px;font-weight:600;cursor:pointer;font-size:15px}
  .q{color:#86a497;font-size:14px;margin:0 0 14px;text-align:center}
  .log{margin-top:16px;max-height:32dvh;overflow:auto}
  .log-item{font-size:14px;color:#86a497;border-left:2px solid #233029;padding:5px 0 5px 13px;margin:9px 0}
  .log-item b{color:#cfe0d8;font-weight:500}
  .log-item .d{display:block;font-size:12px;color:#4d6258;margin-top:3px}
  .empty{color:#4d6258;font-size:14px;text-align:center;padding:16px 0}

  /* ---- Active 90-second experience ---- */
  .live{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(130% 110% at 50% 8%,#1d2a26,#0d1311);padding:28px;text-align:center}
  .live.show{display:flex}
  .live svg{width:clamp(150px,40vw,220px);height:auto;margin-bottom:clamp(20px,4vh,38px);animation:breathe 8s ease-in-out infinite}
  .live .sentence{font-size:clamp(21px,6vw,27px);font-weight:550;line-height:1.3;max-width:18ch;min-height:2.4em;
    display:flex;align-items:center;justify-content:center;color:#eef3f0;margin-bottom:8px;transition:opacity .4s}
  .live .cue{color:#86a497;font-size:clamp(13px,3.6vw,15px);max-width:26ch;min-height:1.5em;margin-bottom:clamp(18px,4vh,32px);transition:opacity .4s}
  .live .timer{font-size:clamp(38px,11vw,50px);font-weight:200;font-variant-numeric:tabular-nums;color:#cfe0d8}
  .live .tlabel{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#4d6258;margin-bottom:clamp(20px,4vh,34px)}
  .acts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .acts button{border:1px solid #2c3b35;background:transparent;color:#cfe0d8;border-radius:11px;padding:11px 16px;font:inherit;font-size:14px;font-weight:500;cursor:pointer}
  .acts button:hover{border-color:#4d6258}
  .acts button.primary{background:#5b8a78;border-color:#5b8a78;color:#fff}
  .done{display:none}.done.show{display:block}
  .done h3{font-size:22px;color:#eef3f0;margin-bottom:8px}
  .done p{color:#86a497;max-width:25ch;margin:0 auto 22px}
</style>
</head>
<body>
  <div class="mark">Steady</div>

  <!-- The object -->
  <div class="stage" id="stage">
    <div class="triangle-wrap">
      <svg viewBox="0 0 200 180">
        <defs>
          <linearGradient id="g" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0" stop-color="#3a5a4d"/><stop offset="1" stop-color="#6fa890"/>
          </linearGradient>
        </defs>
        <polygon class="glow" points="100,18 184,162 16,162" fill="url(#g)"/>
        <polygon points="100,18 184,162 16,162" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>
        <polygon points="100,18 184,162 16,162" fill="url(#g)" opacity="0.12"/>
      </svg>
    </div>
    <div class="whisper" id="whisper">The calm is yours to hold.</div>
    <div class="enter" id="enterHint">tap to enter</div>
  </div>

  <!-- open the hood -->
  <div class="hood" id="hoodTab"><div class="grip"></div></div>

  <!-- hood panel -->
  <div class="panel" id="panel"><div class="panel-inner" id="panelInner"></div></div>

  <!-- live experience -->
  <div class="live" id="live">
    <div id="liveActive">
      <svg viewBox="0 0 200 180"><polygon points="100,18 184,162 16,162" fill="none" stroke="#6fa890" stroke-width="2.5" stroke-linejoin="round"/><polygon points="100,18 184,162 16,162" fill="#6fa890" opacity="0.1"/></svg>
      <div class="sentence" id="sentence">You're having a hard time.</div>
      <div class="cue" id="cue">Drop your shoulders. Both feet on the floor.</div>
      <div class="timer" id="timer">1:30</div>
      <div class="tlabel">stay nearby · say little</div>
      <div class="acts">
        <button id="nextSentence">another sentence</button>
        <button id="tagOut">tag out</button>
        <button id="closeLive">I'm okay</button>
      </div>
    </div>
    <div class="done" id="done">
      <h3 id="doneTitle">90 seconds held.</h3>
      <p id="doneMsg"></p>
      <div class="acts"><button class="primary" id="doneClose">return</button></div>
    </div>
  </div>

<script>
/* ---- ambient whispers at rest ---- */
const WHISPERS=[
  "The calm is yours to hold.",
  "Their job is the storm. Yours is the calm.",
  "They're having a hard time, not giving you one.",
  "Don't climb into the volcano.",
  "Stay near. Say little.",
  "What's making this hard for them right now?"
];
let wi=0;const whisper=document.getElementById('whisper');
setInterval(()=>{
  whisper.style.opacity=0;
  setTimeout(()=>{wi=(wi+1)%WHISPERS.length;whisper.textContent=WHISPERS[wi];whisper.style.opacity=1;},1400);
},7000);

/* ---- the 8 tools (under the hood) ---- */
const TOOLS=[
  {t:"The 90-Second Rule",b:`<p>The first 90 seconds: no teaching, correcting, explaining. They can't access those skills mid-storm.</p><div class="ln">Stay calm. Stay nearby. Say very little.</div>`},
  {t:"One Sentence Only",b:`<p>Pick one line and repeat it. Four sentences make four openings for a power struggle.</p><div class="ln">“You're having a hard time.”</div>`},
  {t:"Don't Climb Into the Volcano",b:`<p>When they're at a 10, you stay at a 3.</p><div class="ln">The child's job isn't to be calm. The adult's is.</div>`},
  {t:"Permission to Tag Out",b:`<p>Agree beforehand on a no-shame exit.</p><div class="ln">“I'm getting activated. Can you take over?”</div>`},
  {t:"Curiosity Over Control",b:`<p>Ask yourself, silently:</p><div class="ln">“What's making this hard for them right now?”</div>`},
  {t:"Physical Grounding",b:`<div class="ln">Drop shoulders · unclench jaw · exhale slow · feet on the floor.</div>`},
  {t:"Post-It Parenting",b:`<div class="ln warm">“They're having a hard time, not giving me a hard time.”</div>`},
  {t:"After-Action Review",b:`<p>Not “why did they do that?” but:</p><div class="ln">“What was the first moment <i>I</i> got activated?”</div>`}
];

const panel=document.getElementById('panel'),panelInner=document.getElementById('panelInner');
function showPanel(html){panelInner.innerHTML=`<div class="grip-c"></div>`+html;panel.classList.add('show');}
function hidePanel(){panel.classList.remove('show');}
panel.onclick=e=>{if(e.target===panel)hidePanel();};

function openHood(){
  const list=TOOLS.map((t,i)=>`<div class="tool" data-i="${i}"><div class="row"><span class="n">${i+1}</span><div class="col"><div class="ti">${t.t}</div><div class="tool-detail">${t.b}</div></div></div></div>`).join('');
  showPanel(`<h2>under the hood · the 8 tools</h2>${list}<div class="reflect-link"><button id="reflectBtn">✎ after-action review</button></div>`);
  panelInner.querySelectorAll('.tool').forEach(el=>el.onclick=()=>el.classList.toggle('open'));
  document.getElementById('reflectBtn').onclick=openReflect;
}
document.getElementById('hoodTab').onclick=openHood;

/* ---- reflection ---- */
const KEY='steady_reflections',load=()=>JSON.parse(localStorage.getItem(KEY)||'[]');
function openReflect(){
  const items=load().slice().reverse();
  const log=items.length?items.map(it=>`<div class="log-item"><b>First flicker:</b> ${it.text.replace(/</g,'&lt;')}<span class="d">${it.date}</span></div>`).join(''):`<div class="empty">The first moment you felt activated is where the learning lives.</div>`;
  showPanel(`<h2>after-action review</h2><p class="q">What was the first moment <i>I</i> got activated?</p><textarea id="reflect" placeholder="The first flicker I felt was…"></textarea><button class="save" id="saveBtn">save</button><div class="log">${log}</div>`);
  document.getElementById('saveBtn').onclick=()=>{
    const v=document.getElementById('reflect').value.trim();if(!v)return;
    const items=load();items.push({text:v,date:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})});
    localStorage.setItem(KEY,JSON.stringify(items));openReflect();
  };
}

/* ---- the 90-second live experience ---- */
const SENT=["You're having a hard time.","I'm here when you're ready.","I hear you're upset.","You didn't like that.","I'm right here."];
const CUE=["Drop your shoulders. Both feet on the floor.","Exhale slowly. Longer out than in.","You don't have to fix it — just be the calm.","What's making this hard for them right now?","Stay at a 3. Don't climb in."];
const live=document.getElementById('live'),timer=document.getElementById('timer'),sEl=document.getElementById('sentence'),
  cEl=document.getElementById('cue'),liveActive=document.getElementById('liveActive'),done=document.getElementById('done'),
  doneTitle=document.getElementById('doneTitle'),doneMsg=document.getElementById('doneMsg');
let rem=90,tick=null,ri=0;
const fmt=s=>Math.floor(s/60)+":"+String(s%60).padStart(2,'0');
function rot(){ri=(ri+1)%SENT.length;sEl.style.opacity=0;cEl.style.opacity=0;setTimeout(()=>{sEl.textContent=SENT[ri];cEl.textContent=CUE[ri];sEl.style.opacity=1;cEl.style.opacity=1;},350);}
function start(){
  rem=90;ri=0;sEl.textContent=SENT[0];cEl.textContent=CUE[0];sEl.style.opacity=1;cEl.style.opacity=1;
  timer.textContent=fmt(rem);liveActive.style.display='block';done.classList.remove('show');live.classList.add('show');
  clearInterval(tick);tick=setInterval(()=>{rem--;timer.textContent=fmt(Math.max(rem,0));if(rem%18===0&&rem>0)rot();if(rem<=0)finish('held');},1000);
}
function finish(k){
  clearInterval(tick);liveActive.style.display='none';
  if(k==='tagout'){doneTitle.textContent="Tagging out is strength.";doneMsg.textContent="You caught it early instead of escalating. Hand off, reset, return when you're at a 3.";}
  else if(k==='okay'){doneTitle.textContent="You stayed out of the volcano.";doneMsg.textContent="When it's quiet, note the first moment you felt yourself getting activated.";}
  else{doneTitle.textContent="90 seconds held.";doneMsg.textContent="You stayed at a 3 while they were at a 10. That's the whole job.";}
  done.classList.add('show');
}
document.getElementById('stage').onclick=start;
document.getElementById('nextSentence').onclick=rot;
document.getElementById('tagOut').onclick=()=>finish('tagout');
document.getElementById('closeLive').onclick=()=>finish('okay');
document.getElementById('doneClose').onclick=()=>{live.classList.remove('show');clearInterval(tick);};
</script>
</body>
</html>
