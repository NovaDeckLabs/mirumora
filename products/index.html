<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Decks — Mirumora</title>
<meta name="description" content="Cards as the unit of growth. Every deck a self-improvement loop.">
<meta name="theme-color" content="#141413" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f3efe8" media="(prefers-color-scheme: light)">
<link rel="icon" href="../assets/Logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: dark light;
  --ink: #141413; --bone: #f3efe8; --bone-dim: #b6b0a3;
  --muted: #7a766c; --line: #2c2925;
  --vignette: radial-gradient(120% 90% at 50% 30%, transparent 0%, rgba(0,0,0,0.62) 100%);
  --grain-opacity: 0.38;
  --cursor-line: rgba(243,239,232,0.95);
  --cta-line: rgba(243,239,232,0.90);
  --cta-fill: rgba(243,239,232,0.10);
  --hover-line: rgba(243,239,232,0.70);
  --logo-filter: invert(1) brightness(1.05);
}
@media (prefers-color-scheme: light){
  :root{
    --ink: #f3efe8; --bone: #141413; --bone-dim: #4f4b44;
    --muted: #756f65; --line: #cec7ba;
    --vignette: radial-gradient(120% 90% at 50% 28%, rgba(255,255,255,0.56) 0%, transparent 48%, rgba(70,61,48,0.12) 100%);
    --grain-opacity: 0.20;
    --cursor-line: rgba(20,20,19,0.90);
    --cta-line: rgba(20,20,19,0.78);
    --cta-fill: rgba(20,20,19,0.07);
    --hover-line: rgba(20,20,19,0.55);
    --logo-filter: none;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  min-height: 100dvh;
  background: var(--ink);
  color: var(--bone);
  font: 15px/1.55 "Hanken Grotesk", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  position: relative;
  user-select: none;
}
body::before{
  content:""; position: fixed; inset: 0;
  background-image: var(--grain, none);
  background-size: 100% 100%; background-repeat: no-repeat; background-position: center;
  opacity: var(--grain-opacity); pointer-events: none; z-index: 2;
}
body::after{
  content:""; position: fixed; inset: 0;
  background: var(--vignette);
  pointer-events: none; z-index: 1;
}
body.has-custom-cursor, body.has-custom-cursor *{ cursor: none !important; }
.cursor{
  position: fixed; left: 0; top: 0; width: 16px; height: 22px;
  border: 1px solid var(--cursor-line); border-radius: 2px;
  pointer-events: none; z-index: 9999;
  transform: translate3d(-100px, -100px, 0);
  transition: opacity .22s ease;
  mix-blend-mode: difference; will-change: transform;
}
.cursor.is-cta{ opacity: 0; }

@property --sweep-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
[data-cta]{ position: relative; display: inline-block; }
[data-cta]::before{
  content:""; position: absolute; inset: -8px -14px;
  border: 1px solid transparent; border-radius: 4px; pointer-events: none;
  background-color: transparent;
  transition: border-color .25s ease, inset .35s cubic-bezier(.2,.8,.2,1), background-color .18s ease-out;
}
[data-cta]:hover::before, [data-cta].is-focus::before{
  border-color: var(--cta-line);
  inset: -13px -22px;
}
[data-cta]:active::before{
  background-color: var(--cta-fill);
  transition: background-color .08s ease-out, border-color .25s ease, inset .35s cubic-bezier(.2,.8,.2,1);
}
[data-cta]::after{
  content:""; position: absolute; inset: -8px -14px; border-radius: 4px; padding: 1.4px;
  background: conic-gradient(from var(--sweep-angle),
    transparent 0%,
    hsla(15, 70%, 75%, 0.95) 5%,
    hsla(45, 65%, 78%, 0.95) 10%,
    hsla(120, 50%, 75%, 0.95) 16%,
    hsla(190, 55%, 75%, 0.95) 22%,
    hsla(260, 50%, 78%, 0.95) 28%,
    hsla(320, 55%, 78%, 0.95) 34%,
    transparent 42%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  opacity: 0; pointer-events: none;
  transition: opacity .35s ease, inset .35s cubic-bezier(.2,.8,.2,1);
}
[data-cta]:hover::after, [data-cta].is-focus::after{
  opacity: 1; inset: -13px -22px;
  animation: cta-sweep 2.2s linear infinite;
}
[data-cta].is-launching::after{
  opacity: 1; inset: -13px -22px;
  animation: cta-sweep 0.55s linear infinite;
}
[data-cta].is-launching .ch{
  transition-duration: 0.18s !important;
  transition-delay: calc(var(--i, 0) * 14ms) !important;
}
@keyframes cta-sweep { to { --sweep-angle: 360deg; } }
.split .ch{
  display: inline-block; color: inherit;
  transition: color .34s ease, text-shadow .34s ease;
  transition-delay: calc(var(--i, 0) * 24ms);
}
.split .ch.sp{ width: 0.28em; }
.split:hover .ch,
.split.is-focus .ch,
[data-cta]:hover .split .ch,
[data-cta].is-focus .split .ch{
  color: hsl(calc(15 + var(--i, 0) * 28), 55%, 78%);
  text-shadow: 0 0 10px hsla(calc(15 + var(--i, 0) * 28), 60%, 70%, 0.35);
}

.app{
  position: relative; z-index: 3;
  width: 100%; min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 90px 0 90px;
}
.logo{
  position: fixed; top: 26px; left: 32px; width: 18px; height: 49px;
  background: url('../assets/Logo.svg') no-repeat center / contain;
  z-index: 5; opacity: 0.85;
  transition: opacity .25s ease;
  filter: var(--logo-filter);
}
.logo:hover{ opacity: 1; }
.back-link{
  position: fixed; top: 26px; right: 32px; z-index: 5;
  font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--bone-dim); text-decoration: none;
}

.page{
  max-width: 540px;
  width: 100%;
  padding: 0 32px;
  text-align: center;
}
.page .eyebrow{
  font-size: 11px;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 22px;
}
.page h1{
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 300;
  font-size: clamp(40px, 5.6vw, 62px);
  line-height: 1.04;
  letter-spacing: -0.01em;
  margin-bottom: 14px;
}
.page h1 em{ font-style: italic; font-weight: 300; }
.page .lede{
  font-family: "Playfair Display", Georgia, serif;
  font-style: italic;
  font-size: clamp(17px, 1.45vw, 19px);
  color: var(--bone-dim);
  max-width: 32ch;
  margin: 0 auto 52px;
}

.decks{
  display: flex;
  flex-direction: column;
  gap: 16px;
  text-align: left;
}
.deck{
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 24px;
  border: 1px solid var(--line);
  border-radius: 4px;
  text-decoration: none;
  color: var(--bone);
  transition: border-color .3s ease, transform .35s cubic-bezier(.2,.8,.2,1);
}
.deck:hover{
  border-color: var(--hover-line);
  transform: translateY(-2px);
}
.deck.is-soon{
  opacity: 0.5;
  pointer-events: none;
}
.deck .name{
  font-family: "Playfair Display", Georgia, serif;
  font-style: italic;
  font-size: 26px;
}
.deck .ext{
  font-size: 14px;
  color: var(--muted);
  font-style: normal;
  margin-left: 8px;
}
.deck .tag{
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.lab-divider{
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 56px 0 22px;
  font-size: 10px;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--muted);
}
.lab-divider::before, .lab-divider::after{
  content:"";
  flex: 1;
  height: 1px;
  background: var(--line);
}

.decks.lab .deck{
  padding: 16px 22px;
}
.decks.lab .deck .name{
  font-size: 20px;
}
.decks.lab .deck .tag{
  font-size: 11px;
}

.anchor{
  position: fixed; bottom: 24px; z-index: 5;
  font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--bone-dim); pointer-events: none;
}
.anchor-bl{ left: 32px; }
.anchor-br{
  right: 32px;
  font-family: "Playfair Display", Georgia, serif;
  font-style: italic; font-size: 14px; letter-spacing: 0.04em;
  text-transform: none; color: var(--muted);
}

@media (max-width: 600px){
  .logo{ top: 20px; left: 22px; width: 14px; height: 38px; }
  .back-link{ top: 22px; right: 22px; }
  .anchor{ bottom: 20px; font-size: 9px; }
  .anchor-bl{ left: 22px; }
  .anchor-br{ right: 22px; font-size: 13px; }
  .page{ padding: 0 22px; }
  .deck{ padding: 18px 18px; }
  .deck .name{ font-size: 22px; }
  .decks.lab .deck .name{ font-size: 18px; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<a class="logo" href="../" aria-label="Mirumora home" data-cta></a>
<a class="back-link" href="../" data-cta>‹ Back</a>

<div class="app">
  <main class="page">
    <div class="eyebrow">Decks</div>
    <h1 data-split>Cards as the <em>unit of growth.</em></h1>
    <p class="lede">Each deck is a self-improvement loop. Portable, completable, beautiful.</p>

    <div class="decks">
      <a class="deck" href="https://recipeflower.com" target="_blank" rel="noopener noreferrer" data-cta>
        <div class="name" data-split>RecipeFlower <span class="ext">↗</span></div>
      </a>
      <a class="deck" href="https://solkin.app" target="_blank" rel="noopener noreferrer" data-cta>
        <div class="name" data-split>Solkin <span class="ext">↗</span></div>
      </a>
      <div class="deck is-soon">
        <div class="name">Liminus</div>
        <div class="tag">soon</div>
      </div>
    </div>

    <div class="lab-divider">In the lab</div>

    <div class="decks lab">
      <a class="deck" href="deescalate/" data-cta>
        <div class="name" data-split>Steady</div>
        <div class="tag">90-second tool</div>
      </a>
      <a class="deck" href="calmthechaos/calmthechhaos.html" data-cta>
        <div class="name" data-split>Calm the Chaos</div>
        <div class="tag">prototype</div>
      </a>
    </div>
  </main>
</div>

<div class="anchor anchor-bl">Mirumora</div>
<div class="anchor anchor-br">@mirumora</div>

<script>
(function(){
  const themeMedia = matchMedia('(prefers-color-scheme: light)');
  function ensureGrain(){
    const light = themeMedia.matches;
    const KEY = light ? 'mir-grain-v1-light' : 'mir-grain-v1-dark';
    let url = null;
    try { url = localStorage.getItem(KEY); } catch(e){}
    if (!url){
      const W = 1200, H = 900;
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      for (let y = 0; y < H; y++){
        const yn = y / H;
        const density = 0.055 + Math.pow(yn, 2.2) * 0.022;
        for (let x = 0; x < W; x++){
          if (Math.random() < density){
            const a = 0.18 + Math.random() * 0.22;
            const grain = light ? '20, 20, 19' : '243, 239, 232';
            ctx.fillStyle = `rgba(${grain}, ${a.toFixed(3)})`;
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
      url = c.toDataURL('image/png');
      try { localStorage.setItem(KEY, url); } catch(e){}
    }
    document.body.style.setProperty('--grain', `url("${url}")`);
  }
  ensureGrain();
  themeMedia.addEventListener('change', ensureGrain);

  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const canCustomCursor = matchMedia('(hover: hover) and (pointer: fine)').matches;
  const cursor = document.getElementById('cursor');
  let cx = innerWidth/2, cy = innerHeight/2, tx = cx, ty = cy;

  if (canCustomCursor){
    try {
      document.body.classList.add('has-custom-cursor');
      addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; }, { passive: true });
      (function tick(){
        cx += (tx - cx) * 0.30;
        cy += (ty - cy) * 0.30;
        cursor.style.transform = `translate3d(${cx}px, ${cy}px, 0) translate(-50%, -50%)`;
        requestAnimationFrame(tick);
      })();
    } catch(e){
      document.body.classList.remove('has-custom-cursor');
      cursor.style.display = 'none';
    }
  } else { cursor.style.display = 'none'; }

  document.querySelectorAll('[data-cta]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.classList.add('is-cta'); el.classList.add('is-focus');
    });
    el.addEventListener('mouseleave', () => {
      cursor.classList.remove('is-cta'); el.classList.remove('is-focus');
    });
  });

  function splitElement(el){
    if (el.classList.contains('split')) return;
    let i = 0;
    function walk(node){
      if (node.nodeType === 3){
        const text = node.textContent;
        const frag = document.createDocumentFragment();
        for (const ch of text){
          const span = document.createElement('span');
          if (ch === ' '){ span.className = 'ch sp'; }
          else { span.className = 'ch'; span.textContent = ch; }
          span.style.setProperty('--i', i++);
          frag.appendChild(span);
        }
        node.parentNode.replaceChild(frag, node);
      } else if (node.nodeType === 1 && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE'){
        [...node.childNodes].forEach(walk);
      }
    }
    walk(el);
    el.classList.add('split');
  }
  document.querySelectorAll('[data-split]').forEach(splitElement);

  document.querySelectorAll('a[data-cta]').forEach(el => {
    el.addEventListener('click', e => {
      const href = el.getAttribute('href');
      if (!href || href === '#' || href.startsWith('mailto:') || href.startsWith('tel:')) return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      if (e.button !== 0) return;
      if (el.classList.contains('is-launching')) return;
      e.preventDefault();
      el.classList.add('is-launching', 'is-focus');
      const target = el.getAttribute('target');
      setTimeout(() => {
        if (target === '_blank'){
          window.open(href, '_blank', 'noopener,noreferrer');
          el.classList.remove('is-launching');
        } else {
          window.location.href = href;
        }
      }, 750);
    });
  });
})();
</script>
</body>
</html>
